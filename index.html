<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Command — Trailer Logistics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a;
  --bg2:#0d1221;
  --white:#111827;
  --s1:rgba(255,255,255,.04);
  --s2:rgba(255,255,255,.07);
  --s3:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --shadow:0 4px 24px rgba(0,0,0,.45);
  --shadow2:0 8px 48px rgba(0,0,0,.6);
  /* brand */
  --gold:#f5b942;
  --gold-l:#fcd34d;
  --gold-bg:rgba(245,185,66,.1);
  --gold-bdr:rgba(245,185,66,.28);
  --blue:#3b82f6;
  --blue-l:#60a5fa;
  --blue-bg:rgba(59,130,246,.12);
  --green:#10b981;
  --green-bg:rgba(16,185,129,.12);
  --red:#f43f5e;
  --red-bg:rgba(244,63,94,.12);
  --orange:#fb923c;
  --orange-bg:rgba(251,146,60,.12);
  --purple:#a78bfa;
  --purple-bg:rgba(167,139,250,.12);
  --text:#f0f4ff;
  --text2:#94a3b8;
  --text3:#475569;
  --font:     'Outfit', sans-serif;
  --mono:     'DM Mono', monospace;
  --disp:     'Syne', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden;}

/* ── CANVAS ── */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── APP ── */
.app{position:relative;z-index:1;display:grid;grid-template-rows:54px 1fr;grid-template-columns:270px 1fr;height:100vh;}

/* ── TOPBAR ── */
.topbar{
  grid-column:1/-1;
  display:flex;align-items:center;
  background:rgba(8,12,24,.92);
  border-bottom:1px solid rgba(200,215,235,.7);
  backdrop-filter:blur(22px);
  box-shadow:0 4px 24px rgba(0,0,0,.5);
}
.brand{
  width:270px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 18px;border-right:1px solid var(--border);
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#f5b942,#d4911a);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px #d4911a35;
}
.brand-mark svg{width:18px;height:18px;}
.brand-name{font-family:var(--disp);font-weight:800;font-size:13.5px;color:var(--text);letter-spacing:.2px;}
.brand-sub{font-size:9.5px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;}

.tnav{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;}
.vbtn{
  padding:6px 18px;border-radius:7px;border:1px solid transparent;
  background:none;color:var(--text2);font-size:12.5px;font-weight:600;
  cursor:pointer;transition:.15s;font-family:var(--font);
}
.vbtn.active{background:var(--blue);color:#fff;box-shadow:0 2px 10px #2563eb28;}
.vbtn:hover:not(.active){background:var(--s2);color:var(--text);border-color:var(--border);}

.tright{display:flex;align-items:center;gap:8px;padding:0 18px;}
.tdaybtn{
  padding:6px 14px;border-radius:7px;
  border:1px solid var(--border);background:var(--white);
  color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:.15s;
}
.tdaybtn:hover{border-color:var(--blue);color:var(--blue);}
.nav-pill{
  display:flex;align-items:center;gap:2px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:9px;padding:3px;
}
.narrow{
  width:28px;height:28px;border-radius:6px;border:none;
  background:none;color:var(--text2);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.14s;
}
.narrow:hover{background:var(--white);color:var(--blue);box-shadow:var(--shadow);}
.hdate{font-family:var(--disp);font-weight:700;font-size:13px;padding:0 8px;color:var(--text);min-width:140px;text-align:center;}

/* ── SIDEBAR ── */
.sidebar{
  background:rgba(16,22,40,.88);
  border-right:1px solid rgba(200,215,235,.6);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:2px 0 16px rgba(60,100,180,.07);
  backdrop-filter:blur(20px);
}
.stabs{display:flex;gap:6px;padding:12px 14px 8px;flex-shrink:0;}
.stab{
  flex:1;padding:7px 4px;border-radius:8px;
  border:1px solid var(--border);background:none;
  color:var(--text2);font-size:11.5px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:.14s;
}
.stab.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px #2563eb22;}
.ssearch{margin:0 14px 8px;position:relative;flex-shrink:0;}
.ssearch input{
  width:100%;background:var(--s1);border:1px solid var(--border);
  border-radius:9px;padding:7px 10px 7px 32px;
  color:var(--text);font-size:12px;outline:none;font-family:var(--font);transition:.14s;
}
.ssearch input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px #2563eb10;}
.ssearch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);width:13px;height:13px;}
.slist{flex:1;overflow-y:auto;padding:4px 10px 14px;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

.ri{
  display:flex;align-items:center;gap:9px;
  padding:8px 8px;border-radius:10px;cursor:pointer;
  transition:.14s;margin-bottom:3px;border:1px solid transparent;
}
.ri:hover{background:var(--blue-bg);border-color:#bfdbfe;}
.ri-av{
  width:33px;height:33px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:800;font-size:12px;flex-shrink:0;
}
.ri-name{font-size:12.5px;font-weight:600;line-height:1.25;color:var(--text);}
.ri-sub{font-size:10.5px;color:var(--text2);}
.rbadge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.rb-free{background:var(--green-bg);color:var(--green);}
.rb-busy{background:var(--blue-bg);color:var(--blue);}
.sgroup{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);padding:10px 8px 5px;}

/* ── CALENDAR ── */
.cal{display:flex;flex-direction:column;height:100%;overflow:hidden;}

.cal-hrow{
  display:grid;flex-shrink:0;
  background:rgba(8,12,24,.88);
  border-bottom:1px solid rgba(180,205,230,.5);
  box-shadow:0 1px 10px rgba(60,100,180,.08);
  backdrop-filter:blur(16px);
}
.hcell{
  padding:9px 10px 7px;text-align:center;
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--text2);
  border-right:1px solid var(--border);
}
.hcell:last-child{border-right:none;}
.day-n{font-family:var(--disp);font-size:20px;font-weight:800;color:#000;line-height:1.1;}
.hcell.today{background:var(--blue-bg);}
.hcell.today .day-n{color:var(--blue);}

/* Month */
.mgrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(7,1fr);}
.mgrid::-webkit-scrollbar{width:4px;}
.mgrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
.mday{
  border-right:1px solid #000;border-bottom:1px solid #000;
  min-height:114px;padding:9px 8px 6px;
  position:relative;cursor:pointer;transition:background .12s;
  background:rgba(255,255,255,.015);
}
.mday:hover{background:rgba(59,130,246,.05);}
.mday.other{opacity:.3;background:rgba(220,232,248,.2);}
.mday.today{background:linear-gradient(160deg,rgba(59,130,246,.09),rgba(59,130,246,.04));box-shadow:inset 0 0 0 1px rgba(59,130,246,.18);}
.mday.today .mdn{
  background:var(--blue);color:#fff;
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:11px;
}
.mdn{font-family:var(--disp);font-weight:800;font-size:13px;display:inline-block;margin-bottom:5px;color:var(--text);}
.madd{
  position:absolute;top:7px;right:7px;width:20px;height:20px;
  border-radius:5px;border:1px solid var(--border2);background:var(--white);
  color:var(--text3);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:.12s;box-shadow:var(--shadow);
}
.mday:hover .madd{opacity:1;}
.madd:hover{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Chips */
.chip{
  border-radius:6px;padding:3px 7px 3px 5px;margin-bottom:2px;
  font-size:10.5px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:4px;
  transition:all .12s;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  animation:chipIn .18s ease;border:1px solid transparent;
}
@keyframes chipIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.chip:hover{transform:translateX(3px);filter:brightness(.94);}
.cc{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.ch-c{background:var(--green-bg);color:var(--green);border-color:#a7f3d0;}
.ch-d{background:var(--blue-bg);color:var(--blue);border-color:#bfdbfe;}
.ch-a{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bdr);}
.ch-m{background:var(--orange-bg);color:var(--orange);border-color:#fed7aa;}
.ch-v{background:var(--purple-bg);color:var(--purple);border-color:#ddd6fe;}
.ch-l{background:var(--red-bg);color:var(--red);border-color:#fecaca;}
.chip-more{font-size:10px;color:var(--text3);padding:1px 6px;cursor:pointer;}
.chip-more:hover{color:var(--blue);}

/* Week/Day */
.tcol{background:var(--s1);border-right:1px solid var(--border);}
.tlabel{
  height:54px;display:flex;align-items:flex-start;
  justify-content:flex-end;padding:5px 9px 0;
  font-family:var(--mono);font-size:9.5px;color:#000;
}
.dcol{border-right:1px solid #000;position:relative;cursor:pointer;background:rgba(255,255,255,.012);}
.dcol:last-child{border-right:none;}
.hline{height:54px;border-bottom:1px solid #000;}
.hline-h{height:27px;border-bottom:1px dashed rgba(0,0,0,.4);}
.wev{
  position:absolute;left:3px;right:3px;border-radius:7px;
  padding:4px 8px;font-size:10px;font-weight:600;
  cursor:pointer;overflow:hidden;z-index:2;transition:.13s;
  border-left:3px solid currentColor;
}
.wev:hover{z-index:5;left:1px;filter:brightness(.94);}

/* ── MODAL ── */
.ov{
  position:fixed;inset:0;z-index:300;
  background:rgba(5,8,18,.75);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.2s;
}
.ov.open{opacity:1;pointer-events:all;}
.modal{
  background:linear-gradient(160deg,rgba(14,20,38,.98),rgba(10,15,30,.98));border:1px solid var(--border2);border-radius:20px;width:100%;max-width:490px;
  max-height:92vh;overflow-y:auto;
  transform:scale(.95) translateY(16px);
  transition:.22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 24px 80px rgba(30,35,64,.2);
}
.modal::-webkit-scrollbar{width:3px;}
.ov.open .modal{transform:scale(1) translateY(0);}
.mh{padding:22px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.mt{font-family:var(--disp);font-weight:800;font-size:19px;color:var(--text);}
.ms{font-size:11.5px;color:var(--text2);margin-top:3px;}
.mx{
  width:30px;height:30px;border-radius:8px;
  border:1px solid var(--border);background:var(--s1);
  cursor:pointer;color:var(--text2);font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:.14s;
}
.mx:hover{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.mb{padding:18px 22px;}
.fg{margin-bottom:15px;}
.fl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:7px;display:block;}
.fi,.fs{
  width:100%;background:var(--s1);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;
  outline:none;transition:.14s;font-family:var(--font);
}
.fi:focus,.fs:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px #2563eb10;}
.fi::placeholder{color:var(--text3);}
.fs option{background:var(--white);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mf{padding:0 22px 22px;display:flex;gap:10px;}

/* Op pills */
.opgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.opill{
  padding:9px 6px;border-radius:9px;border:1px solid var(--border);
  background:var(--s1);cursor:pointer;font-size:11px;font-weight:700;
  text-align:center;transition:.14s;color:var(--text2);
}
.opill:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.opill.sel{border-color:currentColor!important;box-shadow:0 2px 10px color-mix(in srgb,currentColor 25%,transparent);}
.op-c{color:var(--green);}  .op-c.sel{background:var(--green-bg);}
.op-d{color:var(--blue);}   .op-d.sel{background:var(--blue-bg);}
.op-a{color:var(--gold);}   .op-a.sel{background:var(--gold-bg);}
.op-m{color:var(--orange);} .op-m.sel{background:var(--orange-bg);}
.op-v{color:var(--purple);} .op-v.sel{background:var(--purple-bg);}
.op-l{color:var(--red);}    .op-l.sel{background:var(--red-bg);}

/* Conductor search */
.csw{position:relative;}
.csw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px;}
.cdd{
  position:absolute;top:calc(100%+4px);left:0;right:0;
  background:var(--white);border:1px solid var(--border2);
  border-radius:11px;z-index:50;max-height:190px;overflow-y:auto;
  box-shadow:0 12px 40px rgba(30,35,64,.14);display:none;
}
.cdd.open{display:block;}
.cdd::-webkit-scrollbar{width:3px;}
.copt{padding:9px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:9px;transition:.1s;}
.copt:hover{background:var(--blue-bg);}
.co-av{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;font-size:10px;flex-shrink:0;}
.co-name{font-weight:600;font-size:12px;color:var(--text);}
.co-rut{font-size:10.5px;color:var(--text2);}
.selcond{
  display:none;align-items:center;gap:9px;
  background:var(--blue-bg);border:1px solid #bfdbfe;
  border-radius:9px;padding:9px 12px;cursor:pointer;transition:.14s;
}
.selcond:hover{border-color:var(--blue);}
.selcond.vis{display:flex;}
.sc-x{margin-left:auto;color:var(--text3);font-size:12px;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.sc-x:hover{background:var(--red-bg);color:var(--red);}

/* Btns */
.btn{
  padding:10px 18px;border-radius:9px;border:none;
  cursor:pointer;font-size:13px;font-weight:700;
  transition:.15s;display:flex;align-items:center;gap:6px;font-family:var(--font);
}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 2px 12px #2563eb25;}
.btn-blue:hover{background:#1d4ed8;box-shadow:0 4px 18px #2563eb35;transform:translateY(-1px);}
.btn-ghost{background:var(--s1);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-del{background:var(--red-bg);color:var(--red);border:1px solid #fecaca;}
.btn-del:hover{background:#fee2e2;}
.btn-full{flex:1;justify-content:center;}

/* Detail */
.drow{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.drow:last-child{border-bottom:none;}
.dic{width:34px;height:34px;border-radius:9px;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.dk2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);}
.dv{font-size:13px;font-weight:500;margin-top:2px;color:var(--text);}

/* Toast */
.toast{
  position:fixed;bottom:22px;right:22px;z-index:400;
  background:rgba(10,15,30,.96);border:1px solid var(--border2);border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:9px;
  font-size:12.5px;font-weight:600;color:var(--text);
  opacity:0;transform:translateY(10px);transition:.25s;
  pointer-events:none;box-shadow:0 8px 30px rgba(30,35,64,.15);
}
.toast.show{opacity:1;transform:translateY(0);}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Legend */
.legbar{
  display:flex;align-items:center;flex-wrap:wrap;gap:12px;
  padding:7px 16px;border-top:1px solid var(--border);
  background:rgba(255,255,255,.95);flex-shrink:0;
}
.leg{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text2);font-weight:500;}
.ldot{width:7px;height:7px;border-radius:50%;}

/* === PRO EXTRAS === */
.topbar-kpis{display:flex;align-items:center;gap:8px;padding:0 18px;border-right:1px solid var(--border);}
.kpi{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;background:var(--s1);border:1px solid var(--border);transition:.2s;cursor:default;}
.kpi:hover{background:var(--s2);border-color:var(--border2);}
.kpi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulseDot 2s ease infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.6);}}
.kpi-val{font-family:var(--disp);font-weight:800;font-size:13px;}
.kpi-lbl{color:var(--text3);font-size:10px;}
.modal::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--blue),var(--gold),var(--blue));border-radius:20px 20px 0 0;background-size:200% 100%;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0% 0}100%{background-position:200% 0}}
.now-line{position:absolute;left:0;right:0;height:2px;z-index:10;background:linear-gradient(90deg,transparent,var(--red),transparent);pointer-events:none;}
.now-line::before{content:'';position:absolute;left:0;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);}
.status-pulse{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:pulseDot 2.2s ease infinite;}
.brand-name{background:linear-gradient(90deg,#f0f4ff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.mday.today .mdn{background:var(--blue);color:#fff;width:23px;height:23px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 0 12px rgba(59,130,246,.5);}
.ri:hover{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.3);}
.vbtn.active{background:linear-gradient(135deg,rgba(59,130,246,.22),rgba(59,130,246,.1));color:var(--blue-l);border-color:rgba(59,130,246,.3);box-shadow:0 0 16px rgba(59,130,246,.14);}
.wev:hover{z-index:5;left:1px;filter:brightness(1.3);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.35);}
.btn-blue:hover{background:linear-gradient(135deg,#60a5fa,#3b82f6);transform:translateY(-1px);}
.mday:not(.today) .mdn{color:#000 !important;background:transparent;}

/* ═══ ULTRA PRO v3 ═══ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#04081a;--bg2:#060a1f;--panel:rgba(8,14,32,.88);--glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.055);--glass3:rgba(255,255,255,.09);--border:rgba(80,120,200,.12);--border2:rgba(80,120,200,.22);--border3:rgba(80,120,200,.35);--shadow:0 4px 32px rgba(0,0,0,.6);--shadow2:0 8px 64px rgba(0,0,0,.75);--blue:#3b82f6;--blue-l:#60a5fa;--blue-bg:rgba(59,130,246,.1);--indigo:#6366f1;--gold:#f5b942;--gold-l:#fcd34d;--gold-bg:rgba(245,185,66,.08);--green:#10b981;--green-bg:rgba(16,185,129,.1);--red:#f43f5e;--red-bg:rgba(244,63,94,.1);--orange:#fb923c;--orange-bg:rgba(251,146,60,.1);--purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);--text:#e8eeff;--text2:#6b82a8;--text3:#2e3f5e;--font:'Inter',sans-serif;--disp:'Syne',sans-serif;--mono:'DM Mono',monospace;}
html,body{background:var(--bg)!important;font-family:var(--font)!important;}
#bg{opacity:.9;}
.app{grid-template-rows:60px 1fr!important;grid-template-columns:282px 1fr!important;}
.topbar{background:linear-gradient(180deg,rgba(4,8,22,.97),rgba(3,6,18,.95))!important;border-bottom:1px solid rgba(59,130,246,.16)!important;box-shadow:0 2px 0 rgba(59,130,246,.06),0 4px 40px rgba(0,0,0,.55)!important;position:relative;overflow:hidden;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.55),rgba(139,92,246,.55),rgba(59,130,246,.55),transparent);pointer-events:none;}
.brand{width:282px!important;border-right:1px solid rgba(59,130,246,.12)!important;padding:0 20px!important;}
.brand-mark{background:linear-gradient(135deg,#f5b942,#d97706)!important;box-shadow:0 0 22px rgba(245,185,66,.45),0 4px 14px rgba(245,185,66,.2)!important;border-radius:11px!important;width:38px!important;height:38px!important;}
.brand-name{background:linear-gradient(135deg,#e8eeff,#6b82a8)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;font-size:14.5px!important;font-weight:900!important;}
.brand-sub{color:#2e3f5e!important;letter-spacing:1.1px!important;}

.kpi{background:rgba(255,255,255,.025)!important;border:1px solid rgba(80,120,200,.1)!important;border-radius:9px!important;padding:7px 15px!important;transition:all .2s cubic-bezier(.4,0,.2,1)!important;}
.kpi:hover{background:rgba(59,130,246,.07)!important;border-color:rgba(59,130,246,.25)!important;transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.1)!important;}
.kpi-val{font-size:16px!important;font-weight:900!important;}
.kpi-lbl{font-size:9px!important;letter-spacing:.5px!important;text-transform:uppercase!important;}
.tnav{gap:4px!important;}
.vbtn{font-family:var(--font)!important;font-size:12px!important;font-weight:700!important;letter-spacing:.3px!important;border-radius:8px!important;padding:7px 22px!important;}
.vbtn.active{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(99,102,241,.13))!important;color:#93c5fd!important;border:1px solid rgba(59,130,246,.32)!important;box-shadow:0 0 24px rgba(59,130,246,.14)!important;}
.vbtn:hover:not(.active){background:rgba(255,255,255,.04)!important;color:var(--text)!important;}
.sidebar{background:linear-gradient(180deg,rgba(5,9,26,.94),rgba(3,7,19,.9))!important;border-right:1px solid rgba(59,130,246,.13)!important;box-shadow:4px 0 40px rgba(0,0,0,.45)!important;}
.stab{border-radius:8px!important;font-size:11px!important;font-weight:700!important;letter-spacing:.4px!important;background:var(--glass)!important;border-color:var(--border)!important;color:var(--text3)!important;}
.stab.active{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(99,102,241,.1))!important;border-color:rgba(59,130,246,.32)!important;color:#93c5fd!important;box-shadow:0 2px 14px rgba(59,130,246,.14)!important;}
.ssearch input{background:var(--glass)!important;border-color:var(--border)!important;border-radius:10px!important;font-family:var(--font)!important;}
.ssearch input:focus{border-color:rgba(59,130,246,.45)!important;background:rgba(59,130,246,.04)!important;box-shadow:0 0 0 3px rgba(59,130,246,.07)!important;}
.sgroup{font-size:9px!important;letter-spacing:1.3px!important;color:var(--text3)!important;display:flex!important;align-items:center!important;gap:8px!important;}
.sgroup::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);display:block;}
.ri{border-radius:11px!important;padding:9px 10px!important;transition:all .18s cubic-bezier(.4,0,.2,1)!important;}
.ri:hover{background:linear-gradient(135deg,rgba(59,130,246,.07),rgba(99,102,241,.04))!important;border:1px solid rgba(59,130,246,.18)!important;box-shadow:0 2px 20px rgba(59,130,246,.07)!important;}
.ri-av{border-radius:10px!important;width:35px!important;height:35px!important;}
.ri-name{font-size:12.5px!important;font-weight:700!important;color:var(--text)!important;}
.ri-sub{font-size:10px!important;color:var(--text3)!important;}
.rbadge{font-size:8.5px!important;font-weight:800!important;letter-spacing:.4px!important;text-transform:uppercase!important;}
.rb-free{background:rgba(16,185,129,.1)!important;color:#34d399!important;border:1px solid rgba(16,185,129,.18)!important;}
.rb-busy{background:rgba(59,130,246,.09)!important;color:var(--blue-l)!important;border:1px solid rgba(59,130,246,.18)!important;}

.cal-hrow{background:linear-gradient(180deg,rgba(4,8,22,.97),rgba(3,7,19,.93))!important;border-bottom:1px solid rgba(59,130,246,.16)!important;}
.hcell{font-size:9.5px!important;font-weight:700!important;letter-spacing:.9px!important;color:var(--text3)!important;padding:10px 10px 8px!important;}
.hcell.today{background:rgba(59,130,246,.06)!important;}
.day-n{font-size:22px!important;font-weight:900!important;color:var(--text)!important;line-height:1.05!important;margin-top:3px!important;}
.hcell.today .day-n{background:linear-gradient(135deg,#3b82f6,#6366f1)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;}
.mgrid{background:rgba(3,6,16,.8);}
.mday{background:rgba(5,9,22,.65)!important;border-right:1px solid rgba(15,30,70,.9)!important;border-bottom:1px solid rgba(15,30,70,.9)!important;transition:all .16s!important;}
.mday:hover{background:rgba(59,130,246,.05)!important;border-color:rgba(59,130,246,.18)!important;}
.mday.today{background:linear-gradient(160deg,rgba(59,130,246,.08),rgba(99,102,241,.04))!important;box-shadow:inset 0 0 0 1px rgba(59,130,246,.2)!important;}
.mday:not(.today) .mdn{color:var(--text2)!important;background:transparent!important;font-size:13px!important;font-weight:800!important;}
.mday.today .mdn{background:linear-gradient(135deg,#3b82f6,#6366f1)!important;color:#fff!important;box-shadow:0 0 16px rgba(59,130,246,.5)!important;width:27px!important;height:27px!important;border-radius:8px!important;}
.chip{border-radius:7px!important;font-size:9.5px!important;font-weight:600!important;letter-spacing:.15px!important;}
.chip:hover{transform:translateX(4px)!important;filter:brightness(1.15)!important;box-shadow:0 2px 10px rgba(0,0,0,.25)!important;}
.ch-c{background:rgba(16,185,129,.09)!important;color:#34d399!important;border-color:rgba(16,185,129,.18)!important;}
.ch-d{background:rgba(59,130,246,.09)!important;color:#93c5fd!important;border-color:rgba(59,130,246,.18)!important;}
.ch-a{background:rgba(245,185,66,.08)!important;color:#fcd34d!important;border-color:rgba(245,185,66,.18)!important;}
.ch-m{background:rgba(251,146,60,.09)!important;color:#fdba74!important;border-color:rgba(251,146,60,.18)!important;}
.ch-v{background:rgba(167,139,250,.09)!important;color:#c4b5fd!important;border-color:rgba(167,139,250,.18)!important;}
.ch-l{background:rgba(244,63,94,.09)!important;color:#fb7185!important;border-color:rgba(244,63,94,.18)!important;}
.tcol{background:rgba(3,6,18,.8)!important;border-right:1px solid rgba(15,30,70,.9)!important;}
.tlabel{font-size:9px!important;color:var(--text3)!important;font-weight:500!important;}
.dcol{background:rgba(4,8,20,.6)!important;border-right:1px solid rgba(15,30,70,.9)!important;}
.dcol.today{background:rgba(59,130,246,.03)!important;}
.hline{border-bottom:1px solid rgba(15,30,70,.9)!important;}
.hline-h{border-bottom:1px dashed rgba(20,45,90,.6)!important;}
.wev{border-radius:8px!important;font-size:10px!important;font-weight:600!important;box-shadow:0 2px 10px rgba(0,0,0,.25)!important;}
.wev::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent);border-radius:8px;pointer-events:none;}
.wev:hover{filter:brightness(1.2)!important;box-shadow:0 6px 28px rgba(0,0,0,.4)!important;transform:scaleX(1.01);}

.ov{background:rgba(1,3,10,.82)!important;backdrop-filter:blur(28px) saturate(160%)!important;}
.modal{background:linear-gradient(155deg,rgba(6,12,32,.99),rgba(4,8,22,.99))!important;border:1px solid rgba(59,130,246,.16)!important;border-radius:20px!important;box-shadow:0 40px 100px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.03)!important;}
.modal::before{background:linear-gradient(90deg,var(--blue),var(--indigo),var(--gold),var(--indigo),var(--blue))!important;background-size:300% 100%!important;animation:shimmer 4s linear infinite!important;height:2px!important;}
.mt{background:linear-gradient(135deg,var(--text),var(--text2))!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;font-size:20px!important;font-weight:900!important;}
.ms{color:var(--text3)!important;font-size:11px!important;}
.mx{border-radius:9px!important;background:var(--glass)!important;border-color:var(--border)!important;}
.mx:hover{border-color:rgba(244,63,94,.4)!important;color:#fb7185!important;background:rgba(244,63,94,.08)!important;}
.fl{font-size:9px!important;font-weight:800!important;letter-spacing:1px!important;color:var(--text3)!important;}
.fi,.fs{background:rgba(255,255,255,.025)!important;border-color:var(--border)!important;border-radius:9px!important;font-family:var(--font)!important;font-size:13px!important;color:var(--text)!important;}
.fi:focus,.fs:focus{border-color:rgba(59,130,246,.45)!important;background:rgba(59,130,246,.04)!important;box-shadow:0 0 0 3px rgba(59,130,246,.07)!important;}
.opill{background:var(--glass)!important;border-color:var(--border)!important;border-radius:9px!important;font-size:10.5px!important;font-weight:700!important;transition:all .18s cubic-bezier(.4,0,.2,1)!important;}
.opill:hover{transform:translateY(-2px)!important;box-shadow:0 5px 18px rgba(0,0,0,.3)!important;background:var(--glass2)!important;}
.opill.sel{box-shadow:0 0 22px color-mix(in srgb,currentColor 28%,transparent)!important;}
.btn{font-family:var(--font)!important;font-weight:700!important;letter-spacing:.2px!important;border-radius:9px!important;transition:all .18s cubic-bezier(.4,0,.2,1)!important;}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb)!important;box-shadow:0 4px 22px rgba(37,99,235,.42),inset 0 1px 0 rgba(255,255,255,.1)!important;}
.btn-blue:hover{background:linear-gradient(135deg,#60a5fa,#3b82f6)!important;transform:translateY(-2px)!important;box-shadow:0 7px 30px rgba(37,99,235,.5)!important;}
.btn-ghost{background:var(--glass)!important;border-color:var(--border)!important;color:var(--text2)!important;}
.btn-ghost:hover{border-color:rgba(59,130,246,.4)!important;color:var(--blue-l)!important;background:var(--glass2)!important;}
.btn-del{background:rgba(244,63,94,.08)!important;color:#fb7185!important;border:1px solid rgba(244,63,94,.2)!important;}
.btn-del:hover{background:rgba(244,63,94,.17)!important;box-shadow:0 4px 18px rgba(244,63,94,.2)!important;}
.cdd{background:rgba(5,10,26,.98)!important;border-color:var(--border2)!important;border-radius:12px!important;box-shadow:0 20px 52px rgba(0,0,0,.55)!important;}
.copt:hover{background:rgba(59,130,246,.07)!important;}
.selcond{background:rgba(59,130,246,.07)!important;border:1px solid rgba(59,130,246,.22)!important;border-radius:9px!important;}
.toast{background:rgba(4,9,24,.97)!important;border-color:var(--border2)!important;border-radius:14px!important;backdrop-filter:blur(24px)!important;box-shadow:0 14px 44px rgba(0,0,0,.45)!important;}
.legbar{background:rgba(3,6,18,.93)!important;border-top:1px solid rgba(59,130,246,.12)!important;backdrop-filter:blur(24px)!important;}
.leg{font-size:9.5px!important;font-weight:600!important;letter-spacing:.3px!important;color:var(--text3)!important;}
.drow{border-bottom:1px solid var(--border)!important;padding:12px 0!important;}
.dic{background:var(--glass)!important;border:1px solid var(--border)!important;border-radius:10px!important;}
.dk2{font-size:9px!important;font-weight:800!important;letter-spacing:.8px!important;}
.dv{font-size:13px!important;color:var(--text)!important;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(59,130,246,.18);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:rgba(59,130,246,.36);}
@keyframes shimmer{0%{background-position:0% 0}100%{background-position:300% 0}}
.brand-mark-glow{position:absolute;inset:-4px;border-radius:14px;background:radial-gradient(circle,rgba(245,185,66,.3),transparent 70%);animation:glowPulse 3s ease infinite;pointer-events:none;}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}
.topbar-inner-glow{position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(180deg,rgba(59,130,246,.03),transparent);pointer-events:none;}
@keyframes appFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.app{animation:appFadeIn .5s cubic-bezier(.4,0,.2,1) both;}
.topbar{animation:appFadeIn .4s cubic-bezier(.4,0,.2,1) both;}
.sidebar{animation:appFadeIn .45s .05s cubic-bezier(.4,0,.2,1) both;}

/* ═══ LEGIBILITY FIX ═══ */
:root {
  --text:  #f0f5ff;
  --text2: #8fa8d8;
  --text3: #536a90;
  --border:  rgba(80,120,200,.16);
  --border2: rgba(80,120,200,.28);
  --glass:  rgba(255,255,255,.04);
  --glass2: rgba(255,255,255,.07);
}

/* Body */
body { font-size:13.5px; line-height:1.5; }

/* Brand subtitle */
.brand-sub { color:#4a6285 !important; font-size:9.5px !important; }

/* Nav buttons */
.vbtn { font-size:12.5px !important; color:#8fa8d8 !important; }
.vbtn.active { color:#bfdbfe !important; }

/* Topbar date */
.hdate { color:#c8daff !important; -webkit-text-fill-color:#c8daff !important; }

/* Topbar buttons */
.tdaybtn { color:#8fa8d8 !important; font-size:12px !important; }

/* KPIs */
.kpi-lbl { color:#536a90 !important; font-size:10px !important; }

/* ── SIDEBAR ── */
.stab { color:#536a90 !important; font-size:11.5px !important; }
.stab.active { color:#bfdbfe !important; }

.sgroup { color:#536a90 !important; font-size:10px !important; letter-spacing:.9px !important; }

.ssearch input { color:#f0f5ff !important; font-size:12.5px !important; }
.ssearch input::placeholder { color:#3d5578 !important; }

.ri-name { font-size:13px !important; font-weight:700 !important; color:#f0f5ff !important; }
.ri-sub  { font-size:11px !important; color:#536a90 !important; }
.rbadge  { font-size:9.5px !important; }

/* ── CALENDAR HEADER ── */
.hcell { color:#6a85b0 !important; font-size:10.5px !important; letter-spacing:.6px !important; }
.day-n { color:#dce8ff !important; font-size:20px !important; }
.hcell.today .day-n { -webkit-text-fill-color:transparent !important; }

/* Month day numbers */
.mday:not(.today) .mdn { color:#8fa8d8 !important; font-size:13px !important; font-weight:800 !important; }

/* Hour labels in week/day */
.tlabel {
  color:#536a90 !important;
  font-size:10px !important;
  font-weight:600 !important;
  letter-spacing:.3px !important;
}

/* Event chips — month view */
.chip { font-size:10px !important; font-weight:600 !important; padding:3px 8px 3px 7px !important; }
.chip-more { font-size:10px !important; color:#536a90 !important; }

/* Week/day events */
.wev { font-size:11px !important; font-weight:600 !important; line-height:1.4 !important; }

/* ── MODAL ── */
.mt { font-size:20px !important; -webkit-text-fill-color:#f0f5ff !important;
      background:none !important; color:#f0f5ff !important; font-weight:900 !important; }
.ms { color:#6a85b0 !important; font-size:12px !important; }

/* Form labels */
.fl { color:#6a85b0 !important; font-size:10px !important; font-weight:700 !important;
      letter-spacing:.8px !important; margin-bottom:7px !important; }

/* Inputs */
.fi, .fs {
  color:#f0f5ff !important;
  font-size:13px !important;
  background:rgba(255,255,255,.04) !important;
  border-color:rgba(80,120,200,.2) !important;
}
.fi::placeholder { color:#3d5578 !important; }
.fs option { background:#060d26; color:#f0f5ff; }

/* Op pills */
.opill { font-size:11px !important; color:#6a85b0 !important; }
.opill.sel { color:currentColor !important; }

/* Conductor dropdown */
.co-name { color:#f0f5ff !important; font-size:12.5px !important; }
.co-rut  { color:#536a90 !important; font-size:11px !important; }

/* Detail modal rows */
.dk2 { color:#536a90 !important; font-size:10px !important; letter-spacing:.7px !important; }
.dv  { color:#f0f5ff !important; font-size:13.5px !important; line-height:1.5 !important; }

/* Buttons */
.btn-ghost { color:#8fa8d8 !important; font-size:13px !important; }
.btn-blue  { font-size:13px !important; }
.btn-del   { font-size:13px !important; color:#fb7185 !important; }

/* Legend bar */
.leg { color:#6a85b0 !important; font-size:10.5px !important; }

/* Toast */
.toast { color:#f0f5ff !important; font-size:12.5px !important; }

/* Empty state text */
.empty-state { color:#536a90 !important; }

/* ═══ TYPOGRAPHY SYSTEM ═══ */
body { font-size:13.5px !important; line-height:1.55 !important; -webkit-font-smoothing:antialiased !important; }

/* Improve button text */
.btn { font-size:13px !important; padding:10px 20px !important; }
.narrow { font-size:18px !important; }

/* Input sizing */
.fi, .fs { padding:10px 13px !important; font-size:13px !important; line-height:1.45 !important; }

/* Chip text more readable */
.chip { font-size:10.5px !important; line-height:1.4 !important; padding:4px 9px 4px 7px !important; }

/* Week event cards */
.wev { padding:6px 10px !important; font-size:11px !important; line-height:1.45 !important; }

/* Month day content */
.mday { padding:10px 10px 8px !important; }

/* Calendar column headers */
.hcell { font-size:10px !important; letter-spacing:.7px !important; padding:11px 10px 9px !important; }

/* Sidebar search */
.ssearch input { padding:9px 10px 9px 35px !important; font-size:12.5px !important; }

/* Row items */
.ri { padding:10px 11px !important; }
.ri-name { font-size:13px !important; line-height:1.35 !important; }
.ri-sub  { font-size:11px !important; line-height:1.35 !important; margin-top:2px !important; }

/* Modal form */
.fg { margin-bottom:18px !important; }
.fl { margin-bottom:8px !important; font-size:10.5px !important; }
.mh { padding:24px 24px 0 !important; }
.mb { padding:20px 24px !important; }
.mf { padding:4px 24px 24px !important; }

/* Detail rows */
.drow { padding:13px 0 !important; }
.dic { width:38px !important; height:38px !important; font-size:17px !important; }

/* Legend */
.legbar { padding:9px 20px !important; gap:16px !important; }
.leg { font-size:11px !important; gap:6px !important; }
.ldot { width:8px !important; height:8px !important; }

/* Toast */
.toast { padding:14px 20px !important; font-size:13px !important; }

/* Topbar date */
.hdate { font-size:14px !important; font-weight:800 !important; }

/* Stabs */
.stabs { padding:14px 14px 10px !important; }
.stab { padding:8px 6px !important; font-size:11.5px !important; }

/* Nav pills */
.narrow { width:30px !important; height:30px !important; }

/* ═══ NÚMEROS NÍTIDOS ═══ */

/* Números de día — vista mes */
.mdn {
  font-family: var(--disp) !important;
  font-weight: 900 !important;
  font-size: 14px !important;
  color: #ffffff !important;
  -webkit-font-smoothing: antialiased !important;
  text-rendering: optimizeLegibility !important;
  letter-spacing: -.3px !important;
}
.mday:not(.today) .mdn {
  color: #c8daff !important;
  background: transparent !important;
  font-weight: 900 !important;
  font-size: 14px !important;
}
.mday.other .mdn { color: #3a4f72 !important; }

/* Números de día — cabecera semana/día */
.day-n {
  font-family: var(--disp) !important;
  font-weight: 900 !important;
  font-size: 24px !important;
  color: #dce8ff !important;
  letter-spacing: -.5px !important;
  -webkit-font-smoothing: antialiased !important;
}
.hcell.today .day-n {
  background: linear-gradient(135deg,#60a5fa,#818cf8) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  filter: drop-shadow(0 0 8px rgba(96,165,250,.45)) !important;
}

/* Etiquetas de hora — 00:00, 01:00… */
.tlabel {
  font-family: var(--mono) !important;
  font-weight: 600 !important;
  font-size: 10.5px !important;
  color: #6a85b0 !important;
  letter-spacing: .2px !important;

  padding: 8px;
}
.wspan-ev {
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 10.5px;
  font-weight: 600;
  cursor: pointer;
  overflow: hidden;
  transition: filter .13s, transform .13s;

  min-height: 52px;

<script>
// ════════════════════════════════════
// DATA
// ════════════════════════════════════
let C=[];
const CLIENTES=["Walmart Chile","Falabella Retail","Sodimac Homecenter","Jumbo","Ripley","Lider Express","Paris CDC","Corona","SMU","Easy","Cencosud","Tottus","Hites","La Polar","Unimarc","OK Market","Costco Chile","Construmart","Ferreteria Imperial","DHL Chile","Fedex Chile","Starken","Blue Express","Chilexpress","CCU","CMPC","SQM","Codelco","Nestlé Chile","Unilever Chile","P&G Chile","Pepsico","Coca-Cola Andina","Agrosuper","Watt's","Concha y Toro","Viña Santa Rita","Viña Concha y Toro","Entel","Claro Chile"];
let T=[];
let R=[];

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let view='month', cur=new Date(), evs={};
let sTab='c', opSel=null, cSel=null, crDK=null, detRef=null;

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];const DIAS_MON=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DFULL=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const OPC={carga:'#059669',descarga:'#2563eb',ambos:'#d4911a',mantencion:'#ea580c',vacaciones:'#7c3aed',licencia:'#dc2626'};
const OPL={carga:'📦 Carga',descarga:'📤 Descarga',ambos:'🔄 C+D',mantencion:'⚙️ Mant.',vacaciones:'☀️ Vacac.',licencia:'🏥 Licencia'};
const OPCL={carga:'ch-c',descarga:'ch-d',ambos:'ch-a',mantencion:'ch-m',vacaciones:'ch-v',licencia:'ch-l'};
const AVCOLS=['#dbeafe|#2563eb','#dcfce7|#059669','#fef9c3|#d4911a','#fce7f3|#db2777','#ede9fe|#7c3aed','#ffedd5|#ea580c','#fef2f2|#dc2626','#ecfdf5|#059669'];
function avc(id){const[bg,fg]=AVCOLS[id%AVCOLS.length].split('|');return{bg,fg};}

function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function pk(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function cap(s){return s?s.split(' ').map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' '):''}
function ini(n,a){return ((n||'')[0]+(a||'')[0]).toUpperCase();}
function dayEvsList(key){return Object.values(evs[key]||{});}
function allEvsList(){return Object.values(evs).flatMap(d=>Object.values(d));}
function busyC(id,key){return dayEvsList(key).some(e=>e.cId===id);}
function busyT(id,key){return dayEvsList(key).some(e=>e.tId===id);}
function busyR(id,key){return dayEvsList(key).some(e=>e.rId===id);}
function anyBusyC(id){return allEvsList().some(e=>e.cId===id);}
function anyBusyV(id,t){return allEvsList().some(e=>t==='t'?e.tId===id:e.rId===id);}

// ════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════
function setSTab(t){
  sTab=t;
  document.getElementById('st-c').classList.toggle('active',t==='c');
  document.getElementById('st-v').classList.toggle('active',t==='v');
  renderSidebar();updateKPIs();
}
function renderSidebar(){
  const q=document.getElementById('ss').value.toLowerCase();
  const el=document.getElementById('slist');
  let h='';
  if(sTab==='c'){
    const f=C.filter(c=>`${c.n} ${c.a} ${c.rut}`.toLowerCase().includes(q));
    if(!f.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Sin resultados</div>';return;}
    f.forEach(c=>{
      const b=anyBusyC(c.id);
      const d=new Date(c.lic),diff=(d-new Date())/864e5;
      const warn=diff>0&&diff<90,exp=diff<0&&c.lic!=='1969-12-28';
      const {bg,fg}=avc(c.id);
      h+=`<div class="ri" onclick="quickCond(${c.id})">
        <div class="ri-av" style="background:${bg};color:${fg}">${ini(c.n,c.a)}</div>
        <div style="flex:1;min-width:0">
          <div class="ri-name">${cap(c.n)} ${cap(c.a)}</div>
          <div class="ri-sub" style="${warn?'color:var(--orange)':exp?'color:var(--red)':''}">${c.rut}${warn?' ⚠':exp?' ✕ lic.':''}</div>
        </div>
        <span class="rbadge ${b?'rb-busy':'rb-free'}">${b?'Asignado':'Libre'}</span>
      </div>`;
    });
  } else {
    const all=[...T.map(v=>({...v,t:'t',...{tipo:'Tracto'}}),...R.map(v=>({...v,t:'r',...{tipo:'Rampla'}})))];
    const f=all.filter(v=>`${v.p} ${v.m} ${v.mo}`.toLowerCase().includes(q));
    if(!f.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">Sin resultados</div>';return;}
    let pt='';
    f.forEach(v=>{
      if(v.tipo!==pt){h+=`<div class="sgroup">${v.tipo==='Tracto'?'🚛 Tractos':'🚜 Ramplas'}</div>`;pt=v.tipo;}
      const b=anyBusyV(v.id,v.t);
      const col=v.tipo==='Tracto'?'var(--blue)':'var(--gold)';
      const bg=v.tipo==='Tracto'?'var(--blue-bg)':'var(--gold-bg)';
      h+=`<div class="ri">
        <div class="ri-av" style="background:${bg};color:${col};font-size:17px">${v.tipo==='Tracto'?'🚛':'🚜'}</div>
        <div style="flex:1;min-width:0">
          <div class="ri-name" style="font-family:var(--mono);letter-spacing:.4px;font-size:12px">${v.p}</div>
          <div class="ri-sub">${v.tipo} · ${v.m} ${v.mo}</div>
        </div>
        <span class="rbadge ${b?'rb-busy':'rb-free'}">${b?'Asignado':'Libre'}</span>
      </div>`;
    });
  }
  el.innerHTML=h;
}
function quickCond(id){openCreate(dk(new Date()));setTimeout(()=>applyCond(id),60);}

// ════════════════════════════════════
// NAV
// ════════════════════════════════════
function setView(v){
  view=v;
  ['Mes','Sem','Dia','TL'].forEach(x=>{const b=document.getElementById('btn'+x);if(b)b.classList.remove('active');});
  document.getElementById('btn'+{month:'Mes',week:'Sem',day:'Dia',timeline:'TL'}[v]).classList.add('active');
  render();
}
function nav(d){
  if(view==='month'||view==='timeline') cur=new Date(cur.getFullYear(),cur.getMonth()+d,1);
  else if(view==='week') cur=new Date(cur.getTime()+d*7*864e5);
  else cur=new Date(cur.getTime()+d*864e5);
  render();
}
function goToday(){cur=new Date();render();}
function ws(d){const day=d.getDay();const diff=day===0?6:day-1;return new Date(d.getTime()-diff*864e5);}
function upHDate(){
  const el=document.getElementById('hdate');
  if(view==='month'||view==='timeline') el.textContent=`${MESES[cur.getMonth()]} ${cur.getFullYear()}`;
  else if(view==='week'){const s=ws(cur),e=new Date(s.getTime()+6*864e5);el.textContent=`${s.getDate()} ${MESES[s.getMonth()].slice(0,3)} — ${e.getDate()} ${MESES[e.getMonth()].slice(0,3)} ${e.getFullYear()}`;}
  else el.textContent=`${DFULL[cur.getDay()]} ${cur.getDate()} ${MESES[cur.getMonth()]} ${cur.getFullYear()}`;
}

// ════════════════════════════════════
// RENDER
// ════════════════════════════════════
function render(){
  upHDate();
  const calEl=document.getElementById('cal');if(calEl)calEl.setAttribute('data-view',view);
  if(view==='month') renderMonth();
  else if(view==='week') renderWeek();
  else if(view==='timeline') renderTimeline();
  else renderDay();
  renderSidebar();
}

// ── MONTH ──
function renderMonth(){
  const tod=dk(new Date()),y=cur.getFullYear(),m=cur.getMonth();
  const fdRaw=new Date(y,m,1).getDay(),fd=(fdRaw+6)%7,dim=new Date(y,m+1,0).getDate(),dimp=new Date(y,m,0).getDate();
  let h=`<div class="cal-hrow" style="grid-template-columns:repeat(7,1fr)">${DIAS_MON.map(d=>`<div class="hcell">${d}</div>`).join('')}</div>`;
  let g='<div class="mgrid">'; let cnt=0;
  for(let i=fd-1;i>=0;i--){
    const d2=dimp-i,nm=m===0?12:m;
    g+=mCell(`${y}-${String(nm).padStart(2,'0')}-${String(d2).padStart(2,'0')}`,d2,true,tod);cnt++;
  }
  for(let d=1;d<=dim;d++){g+=mCell(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,d,false,tod);cnt++;}

function mCell(key,num,other,tod){

// ── TRIP STATE (date-based or op-based) ──
function getTripState(ev, refKey){
  // Usar estado real de Supabase si está disponible
  if(ev.estado){
    const u=ev.estado.toUpperCase();
    if(u==='PLANIFICADO')                            return{label:'Planificado',color:'#7c3aed'};
    if(u==='ASIGNADO')                               return{label:'Asignado',color:'#dc2626'};
    if(u==='EN RUTA'||u.includes('RUTA'))            return{label:'En Ruta',color:'#d4911a'};
    if(u.includes('PENDIENTE DE DESTINO'))           return{label:'Pend. Destino',color:'#2563eb'};
    if(u.includes('PENDIENTE'))                      return{label:'Pendiente',color:'#2563eb'};
    if(u==='FINALIZADO'||u.includes('FINAL'))        return{label:'Finalizado',color:'#10b981'};
    if(u.includes('ORIGEN')&&u.includes('TRANSITO')) return{label:'Tráns. Origen',color:'#6b7280'};
    if(u.includes('ORIGEN'))                         return{label:'En Origen',color:'#f97316'};
    if(u.includes('DESTINO')&&u.includes('TRANSITO'))return{label:'Tráns. Destino',color:'#3b82f6'};
    if(u.includes('DESTINO'))                        return{label:'En Destino',color:'#10b981'};
    if(u.includes('TERMIN'))                         return{label:'Terminado',color:'#059669'};
    return{label:ev.estado,color:'#6b7280'};
  }
  // Cálculo por fechas si tiene rango
  if(ev.dateStart && ev.dateEnd){
    const ref=new Date(refKey+'T12:00:00');
    if(ev._fechaSalidaDestino && ref>=new Date(ev._fechaSalidaDestino)) return{label:'Terminado',color:'#059669'};
    if(ev._fechaEntradaDestino && ref>=new Date(ev._fechaEntradaDestino)) return{label:'En Destino',color:'#10b981'};
    if(ev._fechaSalidaOrigen && ref>=new Date(ev._fechaSalidaOrigen)) return{label:'Tráns. Destino',color:'#3b82f6'};
    if(ev._fechaEntradaOrigen && ref>=new Date(ev._fechaEntradaOrigen)) return{label:'En Origen',color:'#f97316'};
    return{label:'Tráns. Origen',color:'#6b7280'};
  }
  const m={carga:{label:'En Carga',color:'#059669'},descarga:{label:'Descarga',color:'#2563eb'},ambos:{label:'Carga+Desc',color:'#d4911a'},mantencion:{label:'Mantención',color:'#ea580c'},vacaciones:{label:'Vacaciones',color:'#7c3aed'},licencia:{label:'Licencia',color:'#dc2626'}};
  return m[ev.op]||{label:ev.op||'',color:'#6b7280'};
}

// ── COLLECT EVENTS OVERLAPPING A DATE RANGE ──
function rangeEvsList(fromKey, toKey){
  const res=[];
  Object.entries(evs).forEach(([key,dayEvs])=>{
    Object.values(dayEvs).forEach(ev=>{
      const s=ev.dateStart||key, e=ev.dateEnd||key;
      if(s<=toKey && e>=fromKey) res.push({...ev,_key:key,_dateStart:s,_dateEnd:e});
    });
  });
  return res;
}

// ── WEEK ──
function renderWeek(){
  const tod=dk(new Date()), ws2=ws(cur);
  const days=Array.from({length:7},(_,i)=>new Date(ws2.getTime()+i*864e5));
  const wStartKey=dk(days[0]), wEndKey=dk(days[6]);

  // Header (7 cols, no time column)
  const header=`<div class="cal-hrow" style="grid-template-columns:repeat(7,1fr)">${days.map(d=>{
    const k=dk(d),isT=k===tod;
    return`<div class="hcell${isT?' today':''}"><div>${DIAS[d.getDay()]}</div><div class="day-n">${d.getDate()}</div></div>`;
  }).join('')}</div>`;

  // Collect & position events
  const allEvs=rangeEvsList(wStartKey,wEndKey);
  const wStartMs=new Date(wStartKey+'T12:00:00').getTime();
  allEvs.forEach(ev=>{
    const sOff=Math.round((new Date(ev._dateStart+'T12:00:00')-wStartMs)/864e5);
    const eOff=Math.round((new Date(ev._dateEnd+'T12:00:00')-wStartMs)/864e5);
    ev.colStart=Math.max(0,sOff)+1;
    ev.colEnd=Math.min(6,eOff)+2;
    ev.truncLeft=sOff<0;
    ev.truncRight=eOff>6;
  });

  // Lane assignment (avoid visual overlap)
  allEvs.sort((a,b)=>a.colStart-b.colStart);
  const lanes=[];
  allEvs.forEach(ev=>{
    let placed=false;
    for(let i=0;i<lanes.length;i++){
      if(!lanes[i].some(e=>e.colStart<ev.colEnd && e.colEnd>ev.colStart)){
        lanes[i].push(ev); ev.row=i+1; placed=true; break;
      }
    }
    if(!placed){ev.row=lanes.length+1; lanes.push([ev]);}
  });
  const nRows=Math.max(lanes.length,1);

  // Build grid HTML
  let grid=`<div style="display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(${nRows},56px);gap:3px;padding:8px;position:relative;min-height:${nRows*62}px">`;

  // Background day columns (z-index 0)
  days.forEach((d,i)=>{
    const k=dk(d),isT=k===tod;
    grid+=`<div style="grid-column:${i+1};grid-row:1/${nRows+1};background:${isT?'rgba(59,130,246,.05)':'rgba(255,255,255,.01)'};border-right:1px solid var(--border);border-radius:8px;cursor:pointer;z-index:0" onclick="openCreate('${k}')"></div>`;
  });

  // Event cards (z-index 1)
  allEvs.forEach(ev=>{
    const c2=C.find(x=>x.id===ev.cId), t2=T.find(x=>x.id===ev.tId);
    const col=OPC[ev.op];
    const refKey=ev._dateStart>=wStartKey?ev._dateStart:wStartKey;
    const state=getTripState(ev,refKey);
    const lbl=c2?`${cap(c2.n).split(' ')[0]} ${cap(c2.a).split(' ')[0]}`:OPL[ev.op];
    const truncL=ev.truncLeft?' wspan-trunc-left':'', truncR=ev.truncRight?' wspan-trunc-right':'';
    grid+=`<div class="wspan-ev${truncL}${truncR}" style="grid-column:${ev.colStart}/${ev.colEnd};grid-row:${ev.row};background:${col}18;color:${col};z-index:1" onclick="event.stopPropagation();showDet('${ev._key}','${ev.id}')">
      <div style="font-weight:700;font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lbl}</div>
      ${t2?`<div style="font-size:9px;font-family:var(--mono);opacity:.85">${t2.p}</div>`:''}
      ${ev.cli?`<div style="font-size:9px;opacity:.75;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.cli}</div>`:''}
      <div class="estate-badge" style="background:${state.color}25;color:${state.color}">${state.label}</div>
    </div>`;
  });
  grid+='</div>';

  const empty=`<div style="text-align:center;padding:60px 20px;color:var(--text3);font-size:13px">Sin viajes esta semana<br><span style="font-size:11px;opacity:.55">Haz clic en cualquier día para agregar</span></div>`;
  document.getElementById('cal').innerHTML=`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">${header}<div style="flex:1;overflow-y:auto">${allEvs.length?grid:empty}</div></div>${legBar()}`;
}

// ── TIMELINE ──
function renderTimeline(){
  const y=cur.getFullYear(), m=cur.getMonth();
  const dim=new Date(y,m+1,0).getDate();
  const tod=dk(new Date());
  const monthStart=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const monthEnd=`${y}-${String(m+1).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;

  // Collect month events
  const allEvs=rangeEvsList(monthStart,monthEnd);

  // Map conductor id → events
  const condMap={};
  C.forEach(c=>condMap[c.id]=[]);
  allEvs.forEach(ev=>{
    if(condMap[ev.cId]!==undefined) condMap[ev.cId].push(ev);
    if(ev.cId2!==undefined && condMap[ev.cId2]!==undefined) condMap[ev.cId2].push(ev);
  });

  // Header
  const daysHdr=Array.from({length:dim},(_,i)=>{
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
    return`<div class="tl-day-hdr${k===tod?' today':''}">${i+1}</div>`;
  }).join('');
  const header=`<div class="tl-header"><div class="tl-name-col">Conductor</div><div class="tl-days-hdr" style="grid-template-columns:repeat(${dim},1fr)">${daysHdr}</div></div>`;

  // Rows
  let rows='';
  C.forEach(c=>{
    const cEvs=condMap[c.id]||[];
    const avail=cEvs.length===0;
    const{bg,fg}=avc(c.id);
    const monthStartMs=new Date(y,m,1).getTime();

    const bars=cEvs.map(ev=>{
      const c2=C.find(x=>x.id===ev.cId), t2=T.find(x=>x.id===ev.tId);
      const evS=new Date(ev._dateStart.substring(0,10)+'T00:00:00'), evE=new Date(ev._dateEnd.substring(0,10)+'T00:00:00');
      const mS=new Date(y,m,1), mE=new Date(y,m,dim);
      const clampS=evS<mS?mS:evS, clampE=evE>mE?mE:evE;
      const startDay=Math.floor((clampS-mS)/864e5);
      const spanDays=Math.max(1,Math.floor((clampE-clampS)/864e5)+1);
      const leftPct=(startDay/dim)*100;
      const widthPct=(spanDays/dim)*100;
      const col=OPC[ev.op];
      const lbl=t2?t2.p:(ev.cli||OPL[ev.op]);
      const cName=c2?`${cap(c2.n)} ${cap(c2.a)}`:'';
      const ttData=JSON.stringify({n:cName,op:OPL[ev.op],s:ev._dateStart,e:ev._dateEnd,t:t2?t2.p:'',cli:ev.cli||''}).replace(/'/g,'&apos;');
      return`<div class="tl-bar"
        style="left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;background:linear-gradient(90deg,#6b728099,${col}cc 35%,${OPC.descarga}cc 70%,#10b98199);border-left:3px solid ${col};"
        onmouseenter="showTip(this,'${ttData}',event)"
        onmousemove="moveTip(event)"
        onmouseleave="hideTip()"
        onclick="event.stopPropagation();showDet('${ev._key}','${ev.id}')">
        ${lbl}
      </div>`;
    }).join('');

    const cellBgs=Array.from({length:dim},(_,i)=>{
      const k=`${y}-${String(m+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
      return`<div class="tl-cell-bg${k===tod?' today':''}" onclick="openCreate('${k}')"></div>`;
    }).join('');

    rows+=`<div class="tl-row${avail?' tl-available':''}">
      <div class="tl-cname">
        <div style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;flex-shrink:0;background:${bg};color:${fg}">${ini(c.n,c.a)}</div>
        <div>
          <div class="ri-name" style="font-size:11px">${cap(c.n).split(' ')[0]} ${cap(c.a).split(' ')[0]}</div>
          ${avail?`<div style="font-size:9px;color:var(--green);font-weight:600">Disponible</div>`:''}
        </div>
      </div>
      <div class="tl-cells" style="grid-template-columns:repeat(${dim},1fr)">
        ${cellBgs}${bars}
      </div>
    </div>`;
  });

  document.getElementById('cal').innerHTML=`<div class="tl-wrap"><div style="flex:0 0 auto">${header}</div><div class="tl-body">${rows}</div></div>${legBar()}`;
}

function showTip(el,raw,ev){

    document.getElementById('tt-dates').innerHTML=`Fechas: <span>${d.s} → ${d.e}</span>`;

  if(!opSel){toast_('Selecciona el tipo de operación','#dc2626');return;}
  const tId=parseInt(document.getElementById('evT').value)||null;

  const hi=document.getElementById('hi').value,hf=document.getElementById('hf').value;

  if(rId&&busyR(rId,crDK)){toast_('Rampla ya asignada ese día','#dc2626');return;}
  const evId='m'+Date.now();

  close_('ovC');

  toast_(`✓ ${cap(c2?.n||'')} asignado`,'#059669');

  render();
}

function showDet(key,evId){
  const ev=dayEvsList(key).find(e=>e.id===evId); if(!ev) return;
  detRef={key,evId};
  const c2=C.find(x=>x.id===ev.cId),t2=T.find(x=>x.id===ev.tId),r2=R.find(x=>x.id===ev.rId);
  const d=pk(key);
  document.getElementById('dtit').textContent=c2?`${cap(c2.n)} ${cap(c2.a)}`:OPL[ev.op];
  document.getElementById('dsub').textContent=`${DFULL[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()} · ${ev.hi} → ${ev.hf}`;
  const col=OPC[ev.op]||'#6b7280';
  const state=getTripState(ev, key);
  const cName=c2?`${cap(c2.n)} ${cap(c2.a)}`:(ev._conductorNombre||'');
  const tractoP=t2?t2.p:(ev._patenteTracto||'');
  const ramplaP=r2?r2.p:(ev._patenteRampla||'');
  const rows=[
    ev.nroViaje&&{ic:'🔢',k:'N° Viaje',v:`<span style="font-family:var(--mono);color:var(--gold)">${ev.nroViaje}</span>`},
    ev.tipoOp&&{ic:'🚛',k:'Tipo trailer',v:ev.tipoOp},
    {ic:'🚦',k:'Estado',v:`<span style="color:${state.color};font-weight:700">${state.label}</span>`},
    cName&&{ic:'👤',k:'Conductor',v:`${cName}${c2?' <span style="color:#8fa8d8;font-size:11.5px">· '+c2.rut+'</span>':''}`},
    ev._conductorDosNombre&&{ic:'👤',k:'Conductor 2',v:ev._conductorDosNombre},
    tractoP&&{ic:'🚛',k:'Tracto',v:`<span style="font-family:var(--mono);font-weight:500;color:var(--blue)">${tractoP}</span>`},
    ramplaP&&{ic:'🚜',k:'Rampla',v:`<span style="font-family:var(--mono)">${ramplaP}</span>`},
    ev.cli&&{ic:'🏢',k:'Cliente',v:ev.cli},
    ev.dateStart&&{ic:'📅',k:'Fechas',v:`${ev.dateStart} → ${ev.dateEnd||ev.dateStart}`},
    ev.obs&&{ic:'📝',k:'Observación',v:ev.obs},
  ].filter(Boolean);
  document.getElementById('dbody').innerHTML=rows.map(r=>`<div class="drow"><div class="dic">${r.ic}</div><div><div class="dk2">${r.k}</div><div class="dv">${r.v}</div></div></div>`).join('');
  open_('ovD');
}
function delEv(){
  if(!detRef)return;
  const {key,evId}=detRef;
  const ev=dayEvsList(key).find(e=>e.id===evId);
  if(ev && !ev._manual){toast_('Los viajes de Supabase no se pueden eliminar aquí','#f97316');return;}
  close_('ovD');
  toast_('Entrada eliminada','#ea580c');
  if(evs[key])delete evs[key][evId];
  lsSave();
  render();
}

function open_(id){document.getElementById(id).classList.add('open');}
function close_(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function toast_(msg,col='#059669'){
  const t=document.getElementById('toast');
  document.getElementById('tm').textContent=msg;
  document.getElementById('td').style.background=col;
  t.classList.add('show');clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

function updateKPIs(){
  const busy=new Set(allEvsList().map(e=>e.cId)).size;
  const todEvs=dayEvsList(dk(new Date()));
  const free=C.length-busy;
  const now=new Date();
  const warn=C.filter(c=>{const diff=(new Date(c.lic)-now)/864e5;return diff>0&&diff<90;}).length;
  const el=document.getElementById('kpis');if(!el)return;
  el.innerHTML=
    '<div class="kpi"><div class="kpi-dot" style="background:#10b981;box-shadow:0 0 6px #10b981"></div><span class="kpi-val" style="color:#10b981">'+free+'</span><span class="kpi-lbl">Libres</span></div>'+
    '<div class="kpi"><div class="kpi-dot" style="background:#3b82f6;box-shadow:0 0 6px #3b82f6"></div><span class="kpi-val" style="color:#60a5fa">'+busy+'</span><span class="kpi-lbl">Asignados</span></div>'+
    '<div class="kpi"><div class="kpi-dot" style="background:#f5b942;box-shadow:0 0 6px #f5b942"></div><span class="kpi-val" style="color:#f5b942">'+todEvs.length+'</span><span class="kpi-lbl">Hoy</span></div>'+
    (warn?'<div class="kpi"><div class="kpi-dot" style="background:#fb923c;box-shadow:0 0 6px #fb923c"></div><span class="kpi-val" style="color:#fb923c">'+warn+'</span><span class="kpi-lbl">Lic. prox.</span></div>':'');
}

const SB_URL='https://cfcgkeexjewhijajltwg.supabase.co';
const SB_KEY='sb_publishable_ABThEK5aihgvRmxe1wLMwA_ZbxBKbcF';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
async function sbGet(table,params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:SB_H});
  if(!r.ok) throw new Error(`Supabase ${table}: ${r.status}`);
  return r.json();
}

function lsSave(){
  const manual={};
  Object.entries(evs).forEach(([k,dayEvs])=>{
    const m=Object.fromEntries(Object.entries(dayEvs).filter(([,e])=>e._manual));
    if(Object.keys(m).length) manual[k]=m;
  });
  localStorage.setItem('tl_manual_evs',JSON.stringify(manual));
}
function lsLoad(){
  try{return JSON.parse(localStorage.getItem('tl_manual_evs')||'{}');}catch{return {};}
}

function mapOp(tipo){
  if(!tipo) return 'carga';
  const t=tipo.toLowerCase();
  if(t.includes('desc')&&t.includes('carg')) return 'ambos';
  if(t.includes('desc')) return 'descarga';
  if(t.includes('carg')) return 'carga';
  if(t.includes('mant')) return 'mantencion';
  return 'carga';
}
// Color del evento basado en estado real de Supabase
function estadoToOp(estado){
  if(!estado) return 'carga';
  const u=estado.toUpperCase();
  if(u==='PLANIFICADO')              return 'vacaciones';  // gris/morado
  if(u==='ASIGNADO')                 return 'licencia';    // rojo suave
  if(u==='EN RUTA')                  return 'ambos';       // dorado
  if(u.includes('PENDIENTE'))        return 'descarga';    // azul
  if(u==='FINALIZADO')               return 'carga';       // verde
  return 'carga';
}

async function loadSupabase(){
  // Conductores activos
  const conds=await sbGet('b_conductores','select=id,nombre,rut,estado&estado=eq.1&order=nombre');
  if(Array.isArray(conds)){
    C.length=0;
    conds.forEach(c=>{
      const parts=(c.nombre||'').trim().split(/\s+/);
      const mid=Math.ceil(parts.length/2);
      C.push({id:c.id,n:parts.slice(0,mid).join(' '),a:parts.slice(mid).join(' '),rut:c.rut||'',lic:'2099-01-01'});
    });
  }
  console.log('[SB] conductores cargados:',C.length, C.map(c=>c.id+':'+c.rut).slice(0,5));

  // Vehículos activos
  const vehs=await sbGet('b_vehiculos','select=id,patente,tipo_vehiculo,estado&estado=eq.1');
  if(Array.isArray(vehs)){
    T.length=0; R.length=0;
    vehs.forEach(v=>{
      const tipo=(v.tipo_vehiculo||'').toLowerCase();
      const obj={id:v.id,p:v.patente||'',m:'',mo:v.tipo_vehiculo||''};
      if(tipo.includes('tracto')||tipo.includes('camion')||tipo.includes('cabez')) T.push(obj);
      else R.push(obj);
    });
  }

  // Viajes del trimestre visible
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().split('T')[0];
  const to=new Date(now.getFullYear(),now.getMonth()+3,0).toISOString().split('T')[0];
  const cols='viaje_id,nro_viaje,cliente_estandar,tipo_operacion,patente_tracto,patente_rampla,conductor_principal,rut_conductor_uno,conductor_dos,rut_conductor_dos,estado_viaje_estandar,fecha_entrada_origen,fecha_salida_origen,fecha_entrada_destino,fecha_salida_destino,hora_salida_origen,hora_entrada_destino';
  const viajes=await sbGet('v_viajes_inteligentes',`select=${cols}&fecha_salida_origen=gte.${from}&fecha_salida_origen=lte.${to}&fecha_salida_origen=not.is.null&limit=2000`);
  console.log('[SB] viajes cargados:',Array.isArray(viajes)?viajes.length:viajes);

  // Cargar eventos manuales de localStorage
  const manual=lsLoad();
  evs=JSON.parse(JSON.stringify(manual));

  if(Array.isArray(viajes)){
    viajes.forEach(v=>{
      const dateStart=(v.fecha_salida_origen||'').substring(0,10);
      const rawEnd=v.fecha_salida_destino||v.fecha_entrada_destino||v.fecha_salida_origen;
      const dateEnd=(rawEnd||'').substring(0,10)||dateStart;
      if(!dateStart) return;
      const cond=C.find(c=>c.rut===v.rut_conductor_uno);
      const cond2=C.find(c=>c.rut===v.rut_conductor_dos);
      // Debug viaje 7073 y Atilio
      if(v.viaje_id===7073||v.viaje_id===7193||(v.conductor_principal||'').toLowerCase().includes('atilio')){
        console.log('[SB] viaje Atilio:',v.viaje_id,'rut_v:'+v.rut_conductor_uno,'cond?:',cond?.id,'dateStart:',dateStart,'dateEnd:',dateEnd);
      }
      const tracto=T.find(t=>t.p===v.patente_tracto);
      const rampla=R.find(r=>r.p===v.patente_rampla);
      const eid=String(v.viaje_id);
      if(!evs[dateStart]) evs[dateStart]={};
      evs[dateStart][eid]={
        id:eid, nroViaje:v.nro_viaje,
        cId:cond?.id, cId2:cond2?.id,
        tId:tracto?.id, rId:rampla?.id,
        cli:v.cliente_estandar, op:estadoToOp(v.estado_viaje_estandar), tipoOp:v.tipo_operacion,
        hi:v.hora_salida_origen||'08:00', hf:v.hora_entrada_destino||'18:00',
        dateStart, dateEnd,
        estado:v.estado_viaje_estandar,
        _conductorNombre:v.conductor_principal,
        _conductorDosNombre:v.conductor_dos,
        _patenteTracto:v.patente_tracto,
        _patenteRampla:v.patente_rampla,
        _fechaEntradaOrigen:v.fecha_entrada_origen,
        _fechaSalidaOrigen:v.fecha_salida_origen,
        _fechaEntradaDestino:v.fecha_entrada_destino,
        _fechaSalidaDestino:v.fecha_salida_destino,
      };
    });
  }
  render();
  updateKPIs();
}

// CANVAS BG — ESPECTACULAR v4
// ════════════════════════════════════
(function initBG(){
  const cv=document.getElementById('bg');
  const ctx=cv.getContext('2d');
  let W,H,T=0;

  // Stars
  const STARS=Array.from({length:280},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.3+.2,
    a:Math.random(),speed:Math.random()*.4+.05,
    twinkle:Math.random()*Math.PI*2
  }));

  // Shooting stars
  const SHOOTS=[];
  function spawnShoot(){
    if(SHOOTS.length>3)return;
    SHOOTS.push({x:Math.random()*.7+.1,y:Math.random()*.4,vx:Math.random()*.008+.004,vy:Math.random()*.003+.001,life:1,tail:[]});
  }

  // Aurora layers
  const AURORAS=[
    {x:.15,y:.3,rx:.55,ry:.18,hue:220,speed:.0003,phase:0},
    {x:.6,y:.2,rx:.45,ry:.14,hue:260,speed:.0004,phase:1.5},
    {x:.8,y:.45,rx:.35,ry:.12,hue:190,speed:.00035,phase:3},
    {x:.3,y:.5,rx:.4,ry:.1,hue:280,speed:.00025,phase:4.5},
  ];

  // Grid dots
  const DOTS=[];
  function buildDots(){
    DOTS.length=0;
    const gx=Math.floor(W/80)+2, gy=Math.floor(H/80)+2;
    for(let i=0;i<gx;i++) for(let j=0;j<gy;j++)
      DOTS.push({x:i*80,y:j*80,a:Math.random()*.3});
  }

  function frame(){
    T++;
    ctx.clearRect(0,0,W,H);

    // Deep space gradient
    const bg=ctx.createLinearGradient(0,0,W*.6,H);
    bg.addColorStop(0,'#02040f');
    bg.addColorStop(.4,'#030612');
    bg.addColorStop(1,'#010209');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);

    // Aurora blobs
    AURORAS.forEach(a=>{
      const px=a.x*W+Math.sin(T*a.speed+a.phase)*W*.08;
      const py=a.y*H+Math.cos(T*a.speed*.7+a.phase)*H*.05;
      const g=ctx.createRadialGradient(px,py,0,px,py,a.rx*W);
      const alpha=.055+Math.sin(T*a.speed*2+a.phase)*.02;
      g.addColorStop(0,'hsla('+a.hue+',80%,60%,'+alpha+')');
      g.addColorStop(.5,'hsla('+a.hue+',60%,45%,'+(alpha*.4)+')');
      g.addColorStop(1,'hsla('+a.hue+',40%,30%,0)');
      ctx.save();
      ctx.scale(1,a.ry/a.rx);
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(px,py*(a.rx/a.ry),a.rx*W,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });

    // Grid dots
    ctx.save();
    DOTS.forEach(d=>{
      const alpha=d.a*(0.4+0.3*Math.sin(T*.008+d.x*.01+d.y*.01));
      ctx.fillStyle='rgba(80,130,220,'+alpha+')';
      ctx.beginPath();ctx.arc(d.x,d.y,1,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();

    // Grid lines (very subtle)
    ctx.save();
    ctx.strokeStyle='rgba(40,80,160,.04)';
    ctx.lineWidth=1;
    for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.restore();

    // Stars
    STARS.forEach(s=>{
      const twinkle=.5+.5*Math.sin(T*s.speed+s.twinkle);
      const alpha=s.a*twinkle*.9;
      ctx.save();
      ctx.fillStyle='rgba(200,220,255,'+alpha+')';
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
      if(s.r>1){
        ctx.fillStyle='rgba(200,220,255,'+(alpha*.4)+')';
        ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r*2.5,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    });

    // Shooting stars
    if(Math.random()<.004) spawnShoot();
    for(let i=SHOOTS.length-1;i>=0;i--){
      const s=SHOOTS[i];
      s.tail.push({x:s.x,y:s.y,a:s.life});
      s.x+=s.vx;s.y+=s.vy;s.life-=.018;
      if(s.life<=0){SHOOTS.splice(i,1);continue;}
      ctx.save();
      s.tail.forEach((pt,ti)=>{
        const tf=ti/s.tail.length;
        ctx.fillStyle='rgba(180,210,255,'+(pt.a*tf*.7)+')';
        ctx.beginPath();ctx.arc(pt.x*W,pt.y*H,1.2*tf,0,Math.PI*2);ctx.fill();
      });
      ctx.fillStyle='rgba(220,235,255,'+s.life+')';
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,1.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
      if(s.tail.length>30) s.tail.shift();
    }

    requestAnimationFrame(frame);
  }

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    buildDots();
  }
  window.addEventListener('resize',resize);
  resize();frame();
})();
